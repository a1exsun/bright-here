name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Resolve dependencies
        run: swift package resolve
      - name: Test
        run: swift test
      - name: Build
        run: swift build -c release
      - name: Package app
        run: bash Scripts/package_app.sh
      - name: Create DMG
        run: bash Scripts/create_dmg.sh
      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: BrightHere
          path: |
            release/BrightHere-*.dmg
