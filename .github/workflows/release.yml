name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve dependencies
        run: swift package resolve
      - name: Test
        run: swift test
      - name: Package app
        env:
          SIGN_IDENTITY: ${{ secrets.SIGN_IDENTITY || '-' }}
        run: bash Scripts/package_app.sh
      - name: Notarize if credentials are present
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: bash Scripts/notarize_app.sh release/BrightHere-$(cat VERSION).zip
      - name: Generate Sparkle appcast if key is configured
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          if [ -n "$SPARKLE_PRIVATE_KEY" ]; then
            printf '%s' "$SPARKLE_PRIVATE_KEY" > /tmp/bright-here-sparkle-private-key
            .build/artifacts/sparkle/Sparkle/bin/generate_keys --account bright-here -f /tmp/bright-here-sparkle-private-key
            bash Scripts/generate_appcast.sh
          else
            echo "Skipping Sparkle appcast: SPARKLE_PRIVATE_KEY is not configured."
          fi
      - name: Create GitHub Release for new VERSION
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash Scripts/release_from_main.sh
